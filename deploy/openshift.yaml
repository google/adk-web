# ADK Web UI - OpenShift Deployment
#
# Deploys the ADK Web UI with configurable OIDC authentication.
# Auth settings are injected via ConfigMap -- no image rebuild needed.
#
# Usage:
#   1. Update the ConfigMap values below for your environment
#   2. oc apply -f deploy/openshift.yaml
#   3. Access via the Route URL
#
# To disable auth: remove the "auth" section from runtime-config.json
# or set "enabled": false.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: adk-web-config
  labels:
    app: adk-web
data:
  runtime-config.json: |
    {
      "backendUrl": "http://branch-monitor:8080",
      "auth": {
        "enabled": true,
        "authority": "https://KEYCLOAK_HOST/realms/REALM_NAME",
        "clientId": "adk-web-ui",
        "scopes": "openid profile email"
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adk-web
  labels:
    app: adk-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adk-web
  template:
    metadata:
      labels:
        app: adk-web
    spec:
      containers:
        - name: adk-web
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: app-dist
              mountPath: /usr/share/nginx/html
            - name: config
              mountPath: /usr/share/nginx/html/assets/config/runtime-config.json
              subPath: runtime-config.json
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: app-dist
          emptyDir: {}
        - name: config
          configMap:
            name: adk-web-config
        - name: nginx-conf
          configMap:
            name: adk-web-nginx
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: adk-web-nginx
  labels:
    app: adk-web
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;
      root /usr/share/nginx/html;
      index index.html;

      # SPA fallback -- all routes serve index.html
      location / {
        try_files $uri $uri/ /index.html;
      }

      # Proxy API requests to the ADK backend
      location /list-apps { proxy_pass http://branch-monitor:8080; }
      location /apps/     { proxy_pass http://branch-monitor:8080; }
      location /run_sse   { proxy_pass http://branch-monitor:8080; }
      location /run       { proxy_pass http://branch-monitor:8080; }
      location /version   { proxy_pass http://branch-monitor:8080; }
      location /debug/    { proxy_pass http://branch-monitor:8080; }
      location /builder/  { proxy_pass http://branch-monitor:8080; }
      location /dev/      { proxy_pass http://branch-monitor:8080; }
      location /a2a/      { proxy_pass http://branch-monitor:8080; }

      # Cache static assets
      location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
      }

      # Security headers
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
---
apiVersion: v1
kind: Service
metadata:
  name: adk-web
  labels:
    app: adk-web
spec:
  selector:
    app: adk-web
  ports:
    - port: 8080
      targetPort: 8080
      name: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: adk-web
  labels:
    app: adk-web
spec:
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  to:
    kind: Service
    name: adk-web
    weight: 100
  port:
    targetPort: http
