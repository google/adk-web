# ADK Web UI - OpenShift Deployment
#
# Deploys the ADK Web UI with configurable OIDC authentication.
# Auth settings are injected via ConfigMap -- no image rebuild needed.
#
# Prerequisites:
#   - ADK agent deployed (e.g. branch-monitor service on port 8080)
#   - Keycloak with an 'adk-web-ui' public client (see README)
#
# Usage:
#   1. Create pull secret:
#      oc create secret docker-registry quay-pull-secret \
#        --docker-server=quay.io --docker-username=<user> --docker-password=<pass>
#   2. Update the ConfigMap below with your Keycloak authority URL
#   3. oc apply -f deploy/openshift.yaml -n <namespace>
#   4. oc get route adk-web  (to get the URL)
#
# To disable auth: set "enabled": false in the ConfigMap below,
# or remove the "auth" section entirely.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: adk-web-config
  labels:
    app: adk-web
data:
  # Edit authority to match your OIDC provider:
  #   Keycloak: https://<keycloak-host>/realms/<realm>
  #   Okta:     https://dev-<id>.okta.com
  #   Auth0:    https://<tenant>.auth0.com
  #   Azure AD: https://login.microsoftonline.com/<tenant>/v2.0
  runtime-config.json: |
    {
      "backendUrl": "",
      "auth": {
        "enabled": true,
        "authority": "https://KEYCLOAK_HOST/realms/REALM_NAME",
        "clientId": "adk-web-ui",
        "scopes": "openid profile email"
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adk-web
  labels:
    app: adk-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adk-web
  template:
    metadata:
      labels:
        app: adk-web
    spec:
      imagePullSecrets:
        - name: quay-pull-secret
      containers:
        - name: adk-web
          image: quay.io/rbrhssa/adk-web:latest
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: config
              mountPath: /usr/share/nginx/html/assets/config/runtime-config.json
              subPath: runtime-config.json
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: adk-web-config
        - name: nginx-conf
          configMap:
            name: adk-web-nginx
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: adk-web-nginx
  labels:
    app: adk-web
data:
  default.conf: |
    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy API requests to the ADK agent backend
        location /list-apps { proxy_pass http://branch-monitor:8080; }
        location /apps/     { proxy_pass http://branch-monitor:8080; }
        location /run_sse   { proxy_pass http://branch-monitor:8080; proxy_read_timeout 300s; }
        location /run       { proxy_pass http://branch-monitor:8080; }
        location /version   { proxy_pass http://branch-monitor:8080; }
        location /debug/    { proxy_pass http://branch-monitor:8080; }
        location /builder/  { proxy_pass http://branch-monitor:8080; }
        location /dev/      { proxy_pass http://branch-monitor:8080; }
        location /a2a/      { proxy_pass http://branch-monitor:8080; }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1d;
            add_header Cache-Control "public, immutable";
        }

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
---
apiVersion: v1
kind: Service
metadata:
  name: adk-web
  labels:
    app: adk-web
spec:
  selector:
    app: adk-web
  ports:
    - port: 8080
      targetPort: 8080
      name: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: adk-web
  labels:
    app: adk-web
spec:
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  to:
    kind: Service
    name: adk-web
    weight: 100
  port:
    targetPort: http
