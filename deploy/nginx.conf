server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /list-apps { proxy_pass http://branch-monitor:8080; }
    location /apps/     { proxy_pass http://branch-monitor:8080; }
    location /run_sse   { proxy_pass http://branch-monitor:8080; proxy_read_timeout 300s; }
    location /run       { proxy_pass http://branch-monitor:8080; }
    location /version   { proxy_pass http://branch-monitor:8080; }
    location /debug/    { proxy_pass http://branch-monitor:8080; }
    location /builder/  { proxy_pass http://branch-monitor:8080; }
    location /dev/      { proxy_pass http://branch-monitor:8080; }
    location /a2a/      { proxy_pass http://branch-monitor:8080; }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
